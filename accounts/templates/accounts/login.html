<h1>Login</h1>
{% if message %}
    <p style='color: red;'>{{ message }}</p>
{% endif %} 
<form action="{% url 'accounts:login' %}" method="POST">
    {% csrf_token %}
    <input type="text" name="username" id="Username">
    <input type="password" name="password" id="Password">
    <input type="submit" value="Entrar">
</form>
